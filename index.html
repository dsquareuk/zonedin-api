<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
  <title>ZonedIn — Clarity Beats Chaos</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800;900&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet"/>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script>
    Babel.registerPreset('zi-preset',{presets:[[Babel.availablePresets['react']],[Babel.availablePresets['env'],{targets:{esmodules:true},modules:false}]]});
  </script>
  <style>
    *{box-sizing:border-box;margin:0;padding:0;}
    body{background:#0a0e14;font-family:'DM Sans',sans-serif;}
    input,textarea,button{font-family:'DM Sans',sans-serif;}
    input:focus,textarea:focus{outline:none;border-color:#00C2B2!important;box-shadow:0 0 0 3px rgba(0,194,178,0.12);}
    ::-webkit-scrollbar{width:4px;}
    ::-webkit-scrollbar-thumb{background:rgba(0,194,178,0.25);border-radius:99px;}
    @keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
    @keyframes popIn{from{opacity:0;transform:scale(0.94)}to{opacity:1;transform:scale(1)}}
    @keyframes slideUp{from{opacity:0;transform:translateY(40px)}to{opacity:1;transform:translateY(0)}}
    @keyframes taskPop{0%{transform:scale(0.5) rotate(-10deg);opacity:0}60%{transform:scale(1.2) rotate(4deg)}100%{transform:scale(1);opacity:1}}
    @keyframes goldPulse{0%{box-shadow:0 0 0 0 rgba(245,158,11,0.6)}70%{box-shadow:0 0 0 20px rgba(245,158,11,0)}100%{box-shadow:0 0 0 0 rgba(245,158,11,0)}}
    @keyframes shimmer{0%{background-position:200% center}100%{background-position:-200% center}}
    .fade-up{animation:fadeUp 0.3s ease both;}
    .pop-in{animation:popIn 0.25s ease both;}
    .slide-up{animation:slideUp 0.35s cubic-bezier(0.34,1.2,0.64,1) both;}
    .gold-pulse{animation:goldPulse 0.8s ease-out;}
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="module">
    import{createClient}from'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm';
    window.__supabaseCreateClient=createClient;
    window.dispatchEvent(new Event('supabase-ready'));
  </script>
  <script type="text/babel" data-presets="zi-preset">
    const{useState,useEffect,useRef,useCallback,useMemo}=React;
    const createClient=(...a)=>window.__supabaseCreateClient(...a);
    const SUPABASE_URL="https://takormabbagvdckpxpox.supabase.co";
    const SUPABASE_KEY="sb_publishable_yOWhO9_U1TkyUmsvHy1CCQ_vDl9TTUi";
    const supabase=createClient(SUPABASE_URL,SUPABASE_KEY);

    // ── tokens ───────────────────────────────────────────────────────────────────
    const T={
      bg:"#0a0e14",card:"#111720",card2:"#161d28",
      border:"rgba(255,255,255,0.07)",border2:"rgba(255,255,255,0.12)",
      text:"#F0F4F8",sub:"rgba(240,244,248,0.45)",sub2:"rgba(240,244,248,0.2)",
      teal:"#00C2B2",teal2:"#00E5D4",tealBg:"rgba(0,194,178,0.08)",
      gold:"#F59E0B",goldBg:"rgba(245,158,11,0.10)",gold2:"#FCD34D",
      diamond:"#60A5FA",diamondBg:"rgba(96,165,250,0.10)",
      plat:"#A78BFA",platBg:"rgba(167,139,250,0.10)",
    };

    // ── helpers ──────────────────────────────────────────────────────────────────
    const MILESTONES=[7,14,30,60,90,120,150,200];
    const getMilestoneProgress=s=>{
      const next=MILESTONES.find(m=>m>s)??Math.ceil((s+1)/50)*50;
      const pl=MILESTONES.filter(m=>m<=s);
      let prev=pl.length?pl[pl.length-1]:0;
      if(s>=200)prev=Math.floor(s/50)*50;
      return{next,pct:Math.max(0,Math.min(100,((s-prev)/(next-prev))*100)),daysLeft:next-s};
    };
    const TIER_CONFIG={
      platinum:{label:"Platinum Streak",emoji:"🏆",color:T.plat,bg:T.platBg,border:"rgba(167,139,250,0.35)",multiplier:1.5},
      diamond:{label:"Diamond Streak",emoji:"💎",color:T.diamond,bg:T.diamondBg,border:"rgba(96,165,250,0.35)",multiplier:1.25},
      gold:{label:"Gold Streak",emoji:"🥇",color:T.gold,bg:T.goldBg,border:"rgba(245,158,11,0.35)",multiplier:1.1},
      none:{label:"No Streak",emoji:"—",color:"#6B7280",bg:"rgba(107,114,128,0.08)",border:"rgba(107,114,128,0.2)",multiplier:1.0},
    };
    const getStreakTier=cz=>{
      const g=cz.includes("gold"),d=cz.includes("diamond"),p=cz.includes("platinum");
      if(g&&d&&p)return"platinum";if(g&&d)return"diamond";if(g)return"gold";return"none";
    };
    const LEVELS=[
      {name:"Zone Novice",min:0,badge:"🌱"},{name:"Zone Builder",min:200,badge:"🔨"},
      {name:"Zone Pro",min:600,badge:"⚡"},{name:"Zone Elite",min:1400,badge:"💎"},
      {name:"ZonedIn Master",min:3000,badge:"👑"},
    ];
    const getLevel=pts=>{
      let lv=LEVELS[0];for(const l of LEVELS){if(pts>=l.min)lv=l;}
      const idx=LEVELS.indexOf(lv),next=LEVELS[idx+1]??null;
      const pct=next?Math.min(100,((pts-lv.min)/(next.min-lv.min))*100):100;
      return{...lv,idx,next,pct,ptsToNext:next?next.min-pts:0};
    };
    const calcDayPoints=(cz,extraS,sessComp,hasRef,hasIns,hasME,tier,goldCommitted)=>{
      let b=0;
      const g=cz.includes("gold"),d=cz.includes("diamond"),p=cz.includes("platinum");
      if(g)b+=10;if(g&&d)b+=20;if(g&&d&&p)b+=50;
      if(sessComp)b+=5;else if(g)b+=2;
      if(extraS>0)b+=extraS*3;if(hasRef)b+=10;if(hasIns)b+=5;if(hasME)b+=3;
      if(goldCommitted)b+=15; // bonus for commitment loop
      return Math.round(b*(TIER_CONFIG[tier]?.multiplier??1));
    };
    const fmt=s=>`${String(Math.floor(s/60)).padStart(2,"0")}:${String(s%60).padStart(2,"0")}`;
    const LS={
      get:(k,fb)=>{try{const v=localStorage.getItem(k);return v?JSON.parse(v):fb;}catch{return fb;}},
      set:(k,v)=>{try{localStorage.setItem(k,JSON.stringify(v));}catch{}},
    };
    const todayStr=()=>new Date().toDateString();
    const todayShort=()=>new Date().toLocaleDateString("en-GB",{day:"numeric",month:"short"});
    const greet=()=>{const h=new Date().getHours();if(h<12)return"Good morning";if(h<17)return"Good afternoon";return"Good evening";};
    // Auto-suggest "done looks like" from task text
    const autoDoneSuggest=task=>{
      if(!task)return"";
      const t=task.trim();
      const verbs=[
        [/^finish\s+/i,"Finished: "],
        [/^complete\s+/i,"Completed: "],
        [/^write\s+/i,"Written and saved: "],
        [/^send\s+/i,"Sent: "],
        [/^review\s+/i,"Reviewed: "],
        [/^read\s+/i,"Read: "],
        [/^call\s+/i,"Called: "],
        [/^email\s+/i,"Email sent: "],
        [/^build\s+/i,"Built: "],
        [/^fix\s+/i,"Fixed: "],
        [/^update\s+/i,"Updated: "],
        [/^prepare\s+/i,"Prepared: "],
        [/^plan\s+/i,"Plan ready: "],
        [/^research\s+/i,"Research done: "],
        [/^draft\s+/i,"Draft ready: "],
      ];
      for(const[re,prefix]of verbs){
        if(re.test(t)){
          const rest=t.replace(re,"");
          return prefix+rest.charAt(0).toUpperCase()+rest.slice(1);
        }
      }
      return t+" — done";
    };

    const MOTIVATIONAL=[
      "One zone. One signal. Stay locked.",
      "Clarity is earned one minute at a time.",
      "Momentum builds in silence.",
      "Every second here is a second ahead.",
      "Deep work is the competitive advantage.",
      "Zone in. The world can wait.",
    ];
    const ONBOARDING=[
      {emoji:"🗺️",title:"Map Your Zones",body:"Set three focused tasks each day. Gold is your must-do, Diamond builds momentum, Platinum is your breakthrough."},
      {emoji:"🔥",title:"Zone In",body:"Start a timed focus session. The commitment loop locks you in and gives your session a real finish line."},
      {emoji:"🧠",title:"Close the Loop",body:"Reflect each day. Claude analyses your patterns and tells you exactly what worked and what to try next."},
      {emoji:"🏆",title:"Build Your Streak",body:"Complete zones daily to build streaks and level up. Gold → Diamond → Platinum tier unlocks bigger point multipliers."},
    ];

    // ── sound ────────────────────────────────────────────────────────────────────
    const playCelebrationSound=()=>{
      try{
        const ctx=new(window.AudioContext||window.webkitAudioContext)();
        [523.25,659.25,783.99,1046.50].forEach((freq,i)=>{
          const osc=ctx.createOscillator(),gain=ctx.createGain();
          osc.connect(gain);gain.connect(ctx.destination);osc.type="sine";
          osc.frequency.setValueAtTime(freq,ctx.currentTime+i*0.12);
          gain.gain.setValueAtTime(0,ctx.currentTime+i*0.12);
          gain.gain.linearRampToValueAtTime(0.18,ctx.currentTime+i*0.12+0.02);
          gain.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+i*0.12+0.35);
          osc.start(ctx.currentTime+i*0.12);osc.stop(ctx.currentTime+i*0.12+0.35);
        });
      }catch(e){}
    };
    const playGoldSound=()=>{
      try{
        const ctx=new(window.AudioContext||window.webkitAudioContext)();
        [[392,0],[493.88,0.15],[587.33,0.3],[783.99,0.45],[1046.5,0.6]].forEach(([freq,t])=>{
          const osc=ctx.createOscillator(),gain=ctx.createGain();
          osc.connect(gain);gain.connect(ctx.destination);osc.type="triangle";
          osc.frequency.setValueAtTime(freq,ctx.currentTime+t);
          gain.gain.setValueAtTime(0,ctx.currentTime+t);
          gain.gain.linearRampToValueAtTime(0.22,ctx.currentTime+t+0.03);
          gain.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+t+0.5);
          osc.start(ctx.currentTime+t);osc.stop(ctx.currentTime+t+0.5);
        });
      }catch(e){}
    };

    // ── style helpers ─────────────────────────────────────────────────────────────
    const card=(e={})=>({background:T.card,borderRadius:20,border:`1px solid ${T.border}`,padding:"18px 20px",...e});
    const btn=(e={})=>({border:"none",borderRadius:50,cursor:"pointer",fontFamily:"'DM Sans',sans-serif",fontWeight:700,transition:"all 0.2s",...e});
    const btnPrimary=(e={})=>btn({background:`linear-gradient(135deg,${T.teal},${T.teal2})`,color:"#fff",padding:"14px 28px",fontSize:15,boxShadow:`0 6px 24px rgba(0,194,178,0.25)`,...e});
    const btnGold=(e={})=>btn({background:`linear-gradient(135deg,${T.gold},${T.gold2})`,color:"#1a1200",padding:"16px 28px",fontSize:16,fontWeight:900,boxShadow:`0 8px 28px rgba(245,158,11,0.35)`,...e});

    // ── ZonedInMark ───────────────────────────────────────────────────────────────
    const ZonedInMark=({size=40})=>(
      <svg width={size} height={size} viewBox="0 0 64 64" fill="none">
        <circle cx="32" cy="32" r="26" stroke={T.border2} strokeWidth="3"/>
        <circle cx="32" cy="32" r="16" stroke={T.teal} strokeWidth="5.5"/>
        <circle cx="32" cy="32" r="7" fill={T.card}/>
        <text x="32" y="36" textAnchor="middle" fontSize="11" fontWeight="900" fill={T.text} style={{fontFamily:"'Syne',sans-serif"}}>Z</text>
      </svg>
    );

    // ── Auth ──────────────────────────────────────────────────────────────────────
    const AuthScreen=()=>{
      const[email,setEmail]=useState("");const[sent,setSent]=useState(false);
      const[loading,setLoading]=useState(false);const[error,setError]=useState("");
      const handleLogin=async()=>{
        if(!email.trim())return;setLoading(true);setError("");
        const{error:err}=await supabase.auth.signInWithOtp({email:email.trim(),options:{shouldCreateUser:true}});
        if(err)setError(err.message);else setSent(true);setLoading(false);
      };
      return(
        <div style={{minHeight:"100vh",background:T.bg,display:"flex",alignItems:"center",justifyContent:"center",padding:24}}>
          <div style={{maxWidth:360,width:"100%",textAlign:"center"}}>
            <div style={{marginBottom:20,display:"flex",justifyContent:"center"}}><ZonedInMark size={56}/></div>
            <h1 style={{fontFamily:"'Syne',sans-serif",fontSize:30,fontWeight:900,color:T.text,letterSpacing:-0.5,margin:"0 0 6px"}}>ZonedIn</h1>
            <p style={{fontSize:14,color:T.sub,margin:"0 0 36px"}}>Clarity Beats Chaos</p>
            {!sent?(
              <div style={{background:T.card,borderRadius:24,padding:"32px 28px",border:`1px solid ${T.border}`}}>
                <h2 style={{fontFamily:"'Syne',sans-serif",fontSize:20,fontWeight:800,color:T.text,margin:"0 0 8px"}}>Welcome back</h2>
                <p style={{fontSize:13,color:T.sub,lineHeight:1.6,margin:"0 0 22px"}}>Enter your email for a magic link — no password needed.</p>
                <input type="email" value={email} onChange={e=>setEmail(e.target.value)} onKeyDown={e=>e.key==="Enter"&&handleLogin()} placeholder="your@email.com"
                  style={{width:"100%",padding:"13px 16px",borderRadius:12,border:`1.5px solid ${T.border}`,background:T.card2,color:T.text,fontSize:14,marginBottom:10,boxSizing:"border-box"}}/>
                {error&&<p style={{fontSize:12,color:"#EF4444",margin:"0 0 10px"}}>{error}</p>}
                <button onClick={handleLogin} disabled={loading||!email.trim()} style={btnPrimary({width:"100%",opacity:loading||!email.trim()?0.5:1,cursor:loading||!email.trim()?"not-allowed":"pointer"})}>
                  {loading?"Sending…":"Send Magic Link ✦"}
                </button>
              </div>
            ):(
              <div style={{background:T.card,borderRadius:24,padding:"32px 28px",border:`1px solid rgba(0,194,178,0.2)`}}>
                <div style={{fontSize:52,marginBottom:14}}>📬</div>
                <h2 style={{fontFamily:"'Syne',sans-serif",fontSize:18,fontWeight:800,color:T.text,margin:"0 0 8px"}}>Check your inbox</h2>
                <p style={{fontSize:13,color:T.sub,lineHeight:1.7,margin:"0 0 16px"}}>Magic link sent to <strong style={{color:T.teal}}>{email}</strong>. Click it to sign in.</p>
                <button onClick={()=>setSent(false)} style={btn({background:"none",color:T.sub,fontSize:13,padding:0})}>Use a different email</button>
              </div>
            )}
          </div>
        </div>
      );
    };

    // ── Onboarding ────────────────────────────────────────────────────────────────
    const Onboarding=({onComplete})=>{
      const[step,setStep]=useState(0);const s=ONBOARDING[step];
      return(
        <div style={{position:"fixed",inset:0,zIndex:9998,background:"rgba(0,0,0,0.85)",display:"flex",alignItems:"flex-end",justifyContent:"center",padding:16}}>
          <div className="pop-in" style={{background:T.card,borderRadius:28,padding:"36px 28px 32px",maxWidth:420,width:"100%",textAlign:"center",border:`1px solid ${T.border2}`}}>
            <div style={{fontSize:60,marginBottom:16}}>{s.emoji}</div>
            <h2 style={{fontFamily:"'Syne',sans-serif",fontSize:22,fontWeight:900,color:T.text,margin:"0 0 10px",letterSpacing:-0.3}}>{s.title}</h2>
            <p style={{fontSize:14,color:T.sub,lineHeight:1.75,margin:"0 0 28px"}}>{s.body}</p>
            <div style={{display:"flex",justifyContent:"center",gap:6,marginBottom:24}}>
              {ONBOARDING.map((_,i)=><div key={i} style={{width:i===step?20:6,height:6,borderRadius:99,background:i===step?T.teal:T.border2,transition:"all 0.3s"}}/>)}
            </div>
            <button onClick={()=>step<ONBOARDING.length-1?setStep(x=>x+1):onComplete()} style={btnPrimary({width:"100%"})}>
              {step<ONBOARDING.length-1?"Next →":"Let's Zone In ✦"}
            </button>
            {step<ONBOARDING.length-1&&<button onClick={onComplete} style={btn({background:"none",color:T.sub,fontSize:13,marginTop:12,padding:"6px"})}>Skip intro</button>}
          </div>
        </div>
      );
    };

    // ── GOLD COMMITMENT SCREEN ────────────────────────────────────────────────────
    const CommitmentScreen=({goldTask,streak,tierCfg,onCommit,onSkip})=>{
      const[doneLooks,setDoneLooks]=useState(()=>autoDoneSuggest(goldTask));
      const[focused,setFocused]=useState(false);
      const isGoldStreak=streak>0;
      return(
        <div style={{position:"fixed",inset:0,zIndex:9997,background:"rgba(0,0,0,0.92)",display:"flex",alignItems:"flex-end",justifyContent:"center",padding:16}}>
          <div className="slide-up" style={{background:T.card,borderRadius:28,padding:"36px 24px 28px",maxWidth:420,width:"100%",border:`1px solid rgba(245,158,11,0.2)`,position:"relative",overflow:"hidden"}}>
            {/* Gold glow top */}
            <div style={{position:"absolute",inset:0,background:"radial-gradient(ellipse at 50% 0%,rgba(245,158,11,0.1) 0%,transparent 65%)",pointerEvents:"none"}}/>

            {/* Streak protect nudge */}
            {isGoldStreak&&(
              <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:20,padding:"8px 14px",borderRadius:50,background:`rgba(245,158,11,0.1)`,border:`1px solid rgba(245,158,11,0.2)`,width:"fit-content",margin:"0 auto 20px"}}>
                <span style={{fontSize:14}}>{tierCfg.emoji==="—"?"🔥":tierCfg.emoji}</span>
                <span style={{fontSize:12,fontWeight:700,color:T.gold}}>{streak} day streak — protect it</span>
              </div>
            )}

            {/* Label */}
            <div style={{fontSize:10,fontWeight:700,letterSpacing:2,textTransform:"uppercase",color:T.gold,textAlign:"center",marginBottom:10}}>
              Go for Gold
            </div>

            {/* Task — big and centred */}
            <div style={{fontFamily:"'Syne',sans-serif",fontSize:22,fontWeight:900,color:T.text,textAlign:"center",lineHeight:1.3,marginBottom:24,padding:"0 8px"}}>
              {goldTask}
            </div>

            {/* Done looks like */}
            <div style={{marginBottom:20}}>
              <div style={{fontSize:12,fontWeight:700,color:T.sub,marginBottom:8,textAlign:"center"}}>What does done look like?</div>
              <div style={{position:"relative"}}>
                <input
                  type="text"
                  value={doneLooks}
                  onChange={e=>setDoneLooks(e.target.value)}
                  onFocus={()=>setFocused(true)}
                  onBlur={()=>setFocused(false)}
                  placeholder="e.g. Proposal sent to client"
                  style={{
                    width:"100%",padding:"13px 16px",borderRadius:14,
                    border:`1.5px solid ${focused?"rgba(245,158,11,0.5)":T.border}`,
                    background:T.card2,color:T.text,fontSize:14,boxSizing:"border-box",
                    boxShadow:focused?"0 0 0 3px rgba(245,158,11,0.12)":"none",
                    transition:"all 0.2s",outline:"none",
                  }}
                />
                {doneLooks&&!focused&&(
                  <div style={{position:"absolute",right:12,top:"50%",transform:"translateY(-50%)",fontSize:11,color:T.gold,fontWeight:700}}>✓</div>
                )}
              </div>
            </div>

            {/* Commit button */}
            <button
              onClick={()=>onCommit(doneLooks.trim()||goldTask+" — done")}
              className="gold-pulse"
              style={btnGold({width:"100%",fontSize:17,letterSpacing:0.3})}>
              I'm starting now
            </button>

            <button onClick={onSkip} style={btn({width:"100%",background:"none",color:T.sub,fontSize:13,marginTop:10,padding:"8px"})}>
              Start without committing
            </button>
          </div>
        </div>
      );
    };

    // ── SESSION LOCK ──────────────────────────────────────────────────────────────
    const SessionLock=({secondsLeft,activeZone,doneLooks,onEnd,onCompleteTask,sessionDuration})=>{
      const[msgIdx,setMsgIdx]=useState(0);
      const pct=1-secondsLeft/(sessionDuration*60),r=70,circ=2*Math.PI*r;
      useEffect(()=>{const id=setInterval(()=>setMsgIdx(i=>(i+1)%MOTIVATIONAL.length),8000);return()=>clearInterval(id);},[]);
      return(
        <div style={{position:"fixed",inset:0,zIndex:9999,background:"linear-gradient(160deg,#060a10 0%,#0d1a10 100%)",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",gap:20,padding:24}}>
          {/* Done looks like reminder */}
          {doneLooks&&(
            <div style={{padding:"8px 18px",borderRadius:50,background:"rgba(245,158,11,0.08)",border:"1px solid rgba(245,158,11,0.2)",maxWidth:320,textAlign:"center"}}>
              <span style={{fontSize:10,fontWeight:700,letterSpacing:1,textTransform:"uppercase",color:T.gold,marginRight:6}}>Done looks like:</span>
              <span style={{fontSize:12,color:"rgba(245,158,11,0.8)"}}>{doneLooks}</span>
            </div>
          )}

          {/* Timer ring */}
          <div style={{position:"relative",width:200,height:200}}>
            <svg width="200" height="200" viewBox="0 0 160 160" style={{transform:"rotate(-90deg)"}}>
              <circle cx="80" cy="80" r={r} fill="none" stroke="rgba(255,255,255,0.04)" strokeWidth="8"/>
              <circle cx="80" cy="80" r={r} fill="none" stroke="url(#tg)" strokeWidth="8"
                strokeDasharray={circ} strokeDashoffset={circ*(1-pct)} strokeLinecap="round"
                style={{transition:"stroke-dashoffset 1s linear"}}/>
              <defs>
                <linearGradient id="tg" x1="0" y1="0" x2="1" y2="0">
                  <stop offset="0%" stopColor={T.teal}/><stop offset="100%" stopColor={T.teal2}/>
                </linearGradient>
              </defs>
            </svg>
            <div style={{position:"absolute",inset:0,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center"}}>
              <span style={{fontFamily:"'Syne',sans-serif",fontSize:40,fontWeight:900,color:T.text,letterSpacing:-2}}>{fmt(secondsLeft)}</span>
              <span style={{fontSize:10,color:T.teal,fontWeight:700,letterSpacing:2,textTransform:"uppercase",marginTop:2}}>remaining</span>
            </div>
          </div>

          {/* Zone name */}
          <div style={{textAlign:"center"}}>
            <div style={{fontSize:10,color:T.teal,fontWeight:700,letterSpacing:2,textTransform:"uppercase",marginBottom:8}}>Active Zone</div>
            <div style={{fontFamily:"'Syne',sans-serif",fontSize:20,fontWeight:800,color:T.text,maxWidth:300,lineHeight:1.3}}>{activeZone}</div>
          </div>

          <div style={{maxWidth:300,textAlign:"center",fontSize:14,color:T.sub,lineHeight:1.65,fontStyle:"italic",minHeight:44}}>"{MOTIVATIONAL[msgIdx]}"</div>

          <div style={{display:"flex",gap:10,width:"100%",maxWidth:340}}>
            <button onClick={onCompleteTask}

    // ══════════════════════════════════════════════════════════════════════════════
    // MAIN APP
    // ══════════════════════════════════════════════════════════════════════════════
    const ZonedInMVP=()=>{
      // auth
      const[user,setUser]=useState(null);const[authLoading,setAuthLoading]=useState(true);
      useEffect(()=>{
        supabase.auth.getSession().then(({data:{session}})=>{setUser(session?.user??null);setAuthLoading(false);});
        const{data:{subscription}}=supabase.auth.onAuthStateChange((_,session)=>{setUser(session?.user??null);setAuthLoading(false);});
        return()=>subscription.unsubscribe();
      },[]);

      const[tab,setTab]=useState("plan");

      // data state
      const[dbLoading,setDbLoading]=useState(false);
      const[streak,setStreak]=useState(0);const[lastStreakDate,setLastStreakDate]=useState(null);
      const[streakTier,setStreakTier]=useState("none");const[tierHistory,setTierHistory]=useState([]);
      const[totalPoints,setTotalPoints]=useState(0);const[todayPointsLogged,setTodayPointsLogged]=useState(null);
      const[goldZone,setGoldZone]=useState("");const[diamondZone,setDiamondZone]=useState("");const[platinumZone,setPlatinumZone]=useState("");
      const[zoneLastSet,setZoneLastSet]=useState(null);const[completedZones,setCompletedZones]=useState([]);
      const[activeZoneKey,setActiveZoneKey]=useState("gold");
      const[wentWell,setWentWell]=useState("");const[energy,setEnergy]=useState(3);const[mood,setMood]=useState(null);
      const[insightHistory,setInsightHistory]=useState([]);const[sessionHistory,setSessionHistory]=useState([]);
      const[streakReport,setStreakReport]=useState("");const[hasOnboarded,setHasOnboarded]=useState(false);

      // session state
      const[sessionActive,setSessionActive]=useState(false);
      const[secondsLeft,setSecondsLeft]=useState(25*60);
      const[sessionDuration,setSessionDuration]=useState(25);
      const[lastSession,setLastSession]=useState(null);

      // commitment loop state
      const[showCommitment,setShowCommitment]=useState(false);
      const[currentDoneLooks,setCurrentDoneLooks]=useState("");
      const[isGoldSession,setIsGoldSession]=useState(false);
      const[showReckoning,setShowReckoning]=useState(false);
      const[showGoldComplete,setShowGoldComplete]=useState(false);
      const[pendingSession,setPendingSession]=useState(null);
      const[notQuiteCount,setNotQuiteCount]=useState(()=>LS.get("zi_nq_count",0));

      // ui state
      const[loadingInsight,setLoadingInsight]=useState(false);const[insightError,setInsightError]=useState("");
      const[loadingStreakReport,setLoadingStreakReport]=useState(false);
      const[historyExpanded,setHistoryExpanded]=useState(false);
      const[showInsightHistory,setShowInsightHistory]=useState(false);
      const[savingZones,setSavingZones]=useState(false);
      const intervalRef=useRef(null);const zoneSaveTimer=useRef(null);

      // load
      useEffect(()=>{if(user)loadAllData();},[user]);
      const loadAllData=async()=>{
        setDbLoading(true);
        try{
          const{data:profile}=await supabase.from("profiles").select("*").eq("id",user.id).single();
          if(profile){
            setStreak(profile.streak??0);setLastStreakDate(profile.last_streak_date??null);
            setStreakTier(profile.streak_tier??"none");setTierHistory(profile.tier_history??[]);
            setTotalPoints(profile.total_points??0);setTodayPointsLogged(profile.today_points_logged??null);
            setHasOnboarded(profile.onboarded??false);
          }
          const{data:zones}=await supabase.from("zones").select("*").eq("user_id",user.id).eq("date",todayStr()).single();
          if(zones){
            setGoldZone(zones.gold??"");setDiamondZone(zones.diamond??"");setPlatinumZone(zones.platinum??"");
            setCompletedZones(zones.completed_zones??[]);setWentWell(zones.went_well??"");
            setEnergy(zones.energy??3);setMood(zones.mood??null);
            setActiveZoneKey(zones.active_zone_key??"gold");setZoneLastSet(zones.zone_last_set??null);
          }
          const{data:sessions}=await supabase.from("sessions").select("*").eq("user_id",user.id).order("created_at",{ascending:false}).limit(20);
          if(sessions)setSessionHistory(sessions.map(s=>({date:s.date,zone:s.zone_label,emoji:s.zone_emoji,minutes:s.minutes,completed:s.completed,taskCompleted:s.task_completed,doneLooks:s.commitment_statement})));
          const{data:insights}=await supabase.from("insights").select("*").eq("user_id",user.id).order("created_at",{ascending:false}).limit(7);
          if(insights)setInsightHistory(insights.map(i=>({date:i.date,text:i.text,energy:i.energy,mood:i.mood})));
        }catch(e){console.error(e);}
        finally{setDbLoading(false);}
      };

      // saves
      const saveProfile=useCallback(async(u)=>{if(!user)return;await supabase.from("profiles").upsert({id:user.id,...u});},[user]);
      const saveZonesToDB=useCallback(async(z)=>{if(!user)return;setSavingZones(true);await supabase.from("zones").upsert({user_id:user.id,date:todayStr(),...z},{onConflict:"user_id,date"});setSavingZones(false);},[user]);
      const debouncedSaveZones=useCallback((d)=>{clearTimeout(zoneSaveTimer.current);zoneSaveTimer.current=setTimeout(()=>saveZonesToDB(d),1500);},[saveZonesToDB]);
      const saveSessionToDB=useCallback(async(s)=>{
        if(!user)return;
        await supabase.from("sessions").insert({
          user_id:user.id,zone_label:s.zone,zone_emoji:s.emoji,zone_key:s.zoneKey,
          minutes:s.minutes,completed:s.completed,task_completed:s.taskCompleted??false,
          date:s.date,commitment_statement:s.doneLooks??null,
        });
      },[user]);
      const saveInsightToDB=useCallback(async(i)=>{if(!user)return;await supabase.from("insights").insert({user_id:user.id,date:i.date,text:i.text,energy:i.energy,mood:i.mood});},[user]);

      // zones
      const needsDailyReset=zoneLastSet&&zoneLastSet!==todayStr();
      const handleDailyReset=async()=>{
        setGoldZone("");setDiamondZone("");setPlatinumZone("");
        setCompletedZones([]);setWentWell("");setMood(null);setEnergy(3);setStreakTier("none");setZoneLastSet(todayStr());
        setNotQuiteCount(0);LS.set("zi_nq_count",0);
        await saveZonesToDB({gold:"",diamond:"",platinum:"",completed_zones:[],went_well:"",mood:null,energy:3,active_zone_key:"gold",zone_last_set:todayStr()});
      };
      const handleZoneChange=(setter,field)=>v=>{
        setter(v);const zls=zoneLastSet||todayStr();if(!zoneLastSet)setZoneLastSet(zls);
        debouncedSaveZones({gold:field==="gold"?v:goldZone,diamond:field==="diamond"?v:diamondZone,platinum:field==="platinum"?v:platinumZone,completed_zones:completedZones,went_well:wentWell,energy,mood,active_zone_key:activeZoneKey,zone_last_set:zls});
      };
      const ZONE_CFG=[
        {key:"gold",val:goldZone,set:handleZoneChange(setGoldZone,"gold"),label:"Gold Zone",sublabel:"Non-negotiable",emoji:"🥇",color:T.gold,bg:T.goldBg,border:"rgba(245,158,11,0.35)",placeholder:"Your must-do task today…"},
        {key:"diamond",val:diamondZone,set:handleZoneChange(setDiamondZone,"diamond"),label:"Diamond Zone",sublabel:"Momentum",emoji:"💎",color:T.diamond,bg:T.diamondBg,border:"rgba(96,165,250,0.35)",placeholder:"High-impact task…"},
        {key:"platinum",val:platinumZone,set:handleZoneChange(setPlatinumZone,"platinum"),label:"Platinum Zone",sublabel:"Breakthrough",emoji:"🏆",color:T.plat,bg:T.platBg,border:"rgba(167,139,250,0.35)",placeholder:"Your stretch goal today…"},
      ];
      const activeZone=ZONE_CFG.find(z=>z.key===activeZoneKey);
      const activeZoneLabel=activeZone?.val?.trim()||activeZone?.label||"Gold Zone";
      const isZoneDone=k=>completedZones.includes(k);
      const toggleZoneDone=async(k)=>{
        const next=completedZones.includes(k)?completedZones.filter(x=>x!==k):[...completedZones,k];
        const newTier=getStreakTier(next);const t=todayStr();
        const newHist=[{date:t,tier:newTier},...tierHistory.filter(h=>h.date!==t)].slice(0,30);
        setCompletedZones(next);setStreakTier(newTier);setTierHistory(newHist);
        await saveZonesToDB({gold:goldZone,diamond:diamondZone,platinum:platinumZone,completed_zones:next,went_well:wentWell,energy,mood,active_zone_key:activeZoneKey,zone_last_set:zoneLastSet});
        await saveProfile({streak_tier:newTier,tier_history:newHist});
      };

      // session
      const handleStartSession=useCallback(()=>{
        if(!activeZone?.val?.trim())return;
        if(activeZoneKey==="gold"){
          // Gold zone — show commitment screen first
          setIsGoldSession(true);
          setShowCommitment(true);
        } else {
          // Non-gold — start directly
          setIsGoldSession(false);
          setCurrentDoneLooks("");
          setSecondsLeft(sessionDuration*60);
          setSessionActive(true);
        }
      },[sessionDuration,activeZone,activeZoneKey]);

      const handleCommit=(doneLooks)=>{
        setCurrentDoneLooks(doneLooks);
        setShowCommitment(false);
        setSecondsLeft(sessionDuration*60);
        setSessionActive(true);
      };
      const handleSkipCommit=()=>{
        setCurrentDoneLooks("");
        setIsGoldSession(false);
        setShowCommitment(false);
        setSecondsLeft(sessionDuration*60);
        setSessionActive(true);
      };

      const endSession=useCallback(()=>{
        setSessionActive(false);clearInterval(intervalRef.current);
        const completed=secondsLeft===0,mins=Math.round((sessionDuration*60-secondsLeft)/60);
        const s={date:todayShort(),zone:activeZoneLabel,emoji:activeZone?.emoji||"🥇",zoneKey:activeZoneKey,minutes:mins,completed,doneLooks:currentDoneLooks};
        setPendingSession(s);
        const t=todayStr();
        if(lastStreakDate!==t){const ns=streak+1;setStreak(ns);setLastStreakDate(t);saveProfile({streak:ns,last_streak_date:t});}
        if(isGoldSession&&currentDoneLooks){
          // Show reckoning
          setShowReckoning(true);
        } else {
          setSessionHistory(p=>[s,...p.slice(0,19)]);setLastSession(s);saveSessionToDB(s);
        }
      },[secondsLeft,sessionDuration,activeZoneLabel,activeZone,activeZoneKey,lastStreakDate,streak,isGoldSession,currentDoneLooks]);

      const completeTask=useCallback(()=>{
        setSessionActive(false);clearInterval(intervalRef.current);
        const mins=Math.round((sessionDuration*60-secondsLeft)/60);
        const s={date:todayShort(),zone:activeZoneLabel,emoji:activeZone?.emoji||"🥇",zoneKey:activeZoneKey,minutes:mins,completed:true,taskCompleted:true,doneLooks:currentDoneLooks};
        setPendingSession(s);
        const t=todayStr();
        if(lastStreakDate!==t){const ns=streak+1;setStreak(ns);setLastStreakDate(t);saveProfile({streak:ns,last_streak_date:t});}
        if(isGoldSession&&currentDoneLooks){
          setShowReckoning(true);
        } else {
          setSessionHistory(p=>[s,...p.slice(0,19)]);setLastSession(s);saveSessionToDB(s);
          // auto-mark zone done
          if(!completedZones.includes(activeZoneKey)){
            const next=[...completedZones,activeZoneKey],newTier=getStreakTier(next),t2=todayStr();
            const newHist=[{date:t2,tier:newTier},...tierHistory.filter(h=>h.date!==t2)].slice(0,30);
            setCompletedZones(next);setStreakTier(newTier);setTierHistory(newHist);
            saveZonesToDB({gold:goldZone,diamond:diamondZone,platinum:platinumZone,completed_zones:next,went_well:wentWell,energy,mood,active_zone_key:activeZoneKey,zone_last_set:zoneLastSet});
            saveProfile({streak_tier:newTier,tier_history:newHist});
          }
        }
      },[secondsLeft,sessionDuration,activeZoneLabel,activeZone,activeZoneKey,lastStreakDate,streak,isGoldSession,currentDoneLooks,completedZones,tierHistory,goldZone,diamondZone,platinumZone,wentWell,energy,mood,zoneLastSet]);

      // Reckoning handlers
      const handleReckoningYes=async()=>{
        setShowReckoning(false);
        const s={...pendingSession,taskCompleted:true};
        setSessionHistory(p=>[s,...p.slice(0,19)]);saveSessionToDB(s);
        setNotQuiteCount(0);LS.set("zi_nq_count",0);
        // mark gold zone done
        if(!completedZones.includes("gold")){
          const next=[...completedZones,"gold"],newTier=getStreakTier(next),t=todayStr();
          const newHist=[{date:t,tier:newTier},...tierHistory.filter(h=>h.date!==t)].slice(0,30);
          setCompletedZones(next);setStreakTier(newTier);setTierHistory(newHist);
          await saveZonesToDB({gold:goldZone,diamond:diamondZone,platinum:platinumZone,completed_zones:next,went_well:wentWell,energy,mood,active_zone_key:activeZoneKey,zone_last_set:zoneLastSet});
          await saveProfile({streak_tier:newTier,tier_history:newHist});
        }
        // Show gold complete share screen
        setShowGoldComplete(true);
      };
      const handleReckoningNotQuite=async()=>{
        setShowReckoning(false);
        const nq=notQuiteCount+1;
        setNotQuiteCount(nq);LS.set("zi_nq_count",nq);
        const s={...pendingSession,taskCompleted:false};
        setSessionHistory(p=>[s,...p.slice(0,19)]);setLastSession(s);saveSessionToDB(s);
      };
      const handleGoldCompleteDismiss=()=>{
        setShowGoldComplete(false);setPendingSession(null);
        setCurrentDoneLooks("");setIsGoldSession(false);
        setTab("reflect");
      };

      useEffect(()=>{
        if(sessionActive){intervalRef.current=setInterval(()=>setSecondsLeft(s=>{if(s<=1){endSession();return 0;}return s-1;}),1000);}
        return()=>clearInterval(intervalRef.current);
      },[sessionActive,endSession]);

      // points
      const logTodayPoints=async(hasInsight,goldCommitted)=>{
        const t=todayStr();if(todayPointsLogged===t)return 0;
        const todaySess=sessionHistory.filter(s=>s.date===todayShort());
        const pts=calcDayPoints(completedZones,Math.max(0,todaySess.length-1),todaySess.some(s=>s.completed),!!wentWell.trim(),hasInsight,!!(mood&&energy),streakTier,goldCommitted);

          </div>
          {latestInsight&&!loadingInsight&&(
            <div style={{margin:"0 16px 12px",background:`linear-gradient(135deg,rgba(0,194,178,0.07),rgba(167,139,250,0.05))`,border:`1px solid rgba(0,194,178,0.18)`,borderRadius:18,overflow:"hidden"}}>
              <div style={{padding:"12px 16px",background:"rgba(0,194,178,0.07)",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                <div style={{display:"flex",alignItems:"center",gap:8}}>
                  <div style={{width:6,height:6,borderRadius:"50%",background:T.teal,flexShrink:0}}/>
                  <span style={{fontSize:11,fontWeight:700,letterSpacing:1,textTransform:"uppercase",color:T.teal}}>Claude Insight</span>
                  {latestInsight.mood&&<span style={{fontSize:13}}>{latestInsight.mood}</span>}
                  {latestInsight.energy&&<span style={{fontSize:11,color:T.sub}}>⚡{latestInsight.energy}/5</span>}
                </div>
                <div style={{display:"flex",alignItems:"center",gap:8}}>
                  <span style={{fontSize:11,color:T.sub}}>{latestInsight.date}</span>
                  {insightHistory.length>1&&<button onClick={()=>setShowInsightHistory(h=>!h)} style={btn({background:"none",color:T.teal,fontSize:11,fontWeight:700,padding:0})}>{showInsightHistory?"Hide ↑":`+${insightHistory.length-1} ↓`}</button>}
                </div>
              </div>
              <div style={{padding:"14px 16px",fontSize:14,lineHeight:1.85,color:"rgba(240,244,248,0.8)",whiteSpace:"pre-wrap"}}>{latestInsight.text}</div>
              {showInsightHistory&&insightHistory.slice(1).map((ins,i)=>(
                <div key={i} style={{borderTop:`1px solid ${T.border}`,padding:"12px 16px"}}>
                  <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:6}}>
                    <span style={{fontSize:11,fontWeight:700,color:T.sub}}>{ins.date}</span>
                    {ins.mood&&<span style={{fontSize:13}}>{ins.mood}</span>}
                  </div>
                  <div style={{fontSize:13,lineHeight:1.7,color:T.sub,whiteSpace:"pre-wrap"}}>{ins.text}</div>
                </div>
              ))}
            </div>
          )}
        </div>
      );

      // ── PROGRESS TAB ────────────────────────────────────────────────────────────
      const ProgressTab=()=>(
        <div className="fade-up">
          <div style={{padding:"20px 20px 14px",display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}>
            <div>
              <div style={{fontFamily:"'Syne',sans-serif",fontSize:22,fontWeight:900,color:T.text,letterSpacing:-0.3}}>Your Progress 🏆</div>
              <div style={{fontSize:13,color:T.sub,marginTop:3}}>Streak · Level · History</div>
            </div>
            <span style={{background:T.card,border:`1px solid ${T.border}`,borderRadius:50,padding:"5px 12px",fontSize:12,fontWeight:700,color:T.teal,whiteSpace:"nowrap"}}>
              {currentLevel.badge} {currentLevel.name}
            </span>
          </div>
          {/* streak hero */}
          <div style={{margin:"0 16px 12px",padding:"20px",borderRadius:20,background:`linear-gradient(135deg,${tierCfg.bg},transparent)`,border:`1.5px solid ${tierCfg.border}`,display:"flex",alignItems:"center",gap:16}}>
            <div>
              <div style={{fontFamily:"'Syne',sans-serif",fontSize:52,fontWeight:900,color:tierCfg.color,letterSpacing:-3,lineHeight:1}}>{streak}</div>
              <div style={{fontSize:10,fontWeight:700,letterSpacing:1.5,textTransform:"uppercase",color:T.sub,marginTop:4}}>Day Streak</div>
            </div>
            <div style={{flex:1}}>
              <div style={{fontFamily:"'Syne',sans-serif",fontSize:16,fontWeight:800,color:tierCfg.color,marginBottom:6}}>{tierCfg.emoji==="—"?"🔘":tierCfg.emoji} {tierCfg.label}</div>
              <div style={{fontSize:12,color:T.sub,marginBottom:8}}>
                {streakTier==="none"&&"Complete Gold Zone to start your streak"}
                {streakTier==="gold"&&"Complete Diamond too to upgrade"}
                {streakTier==="diamond"&&"Complete Platinum to reach the top"}
                {streakTier==="platinum"&&"🔥 Perfect streak — firing on all cylinders"}
              </div>
              <div style={{height:5,borderRadius:99,background:"rgba(255,255,255,0.06)",overflow:"hidden"}}>
                <div style={{height:"100%",borderRadius:99,width:`${milestonePct}%`,background:`linear-gradient(90deg,${tierCfg.color},${tierCfg.color}bb)`,transition:"width 0.8s ease"}}/>
              </div>
              <div style={{display:"flex",justifyContent:"space-between",marginTop:5}}>
                <span style={{fontSize:11,color:T.sub}}>Day {streak}</span>
                <span style={{fontSize:11,color:tierCfg.color,fontWeight:700}}>{daysLeft}d to Day {nextMilestone}</span>
              </div>
            </div>
            <div style={{textAlign:"center",flexShrink:0}}>
              <div style={{fontSize:10,fontWeight:700,letterSpacing:1,textTransform:"uppercase",color:T.sub,marginBottom:4}}>Boost</div>
              <div style={{fontFamily:"'Syne',sans-serif",fontSize:22,fontWeight:900,color:tierCfg.color}}>{tierCfg.multiplier}×</div>
            </div>
          </div>
          {/* level */}
          <div style={{display:"flex",gap:10,margin:"0 16px 12px"}}>
            <div style={{...card({flex:1,padding:"16px",textAlign:"center"})}}>
              <div style={{fontSize:28,marginBottom:4}}>{currentLevel.badge}</div>
              <div style={{fontFamily:"'Syne',sans-serif",fontSize:13,fontWeight:800,color:T.text}}>{currentLevel.name}</div>
              <div style={{fontSize:11,color:T.teal,fontWeight:600,marginTop:2}}>{totalPoints.toLocaleString()} pts</div>
            </div>
            {currentLevel.next&&(
              <div style={{...card({flex:1,padding:"16px",background:"rgba(0,194,178,0.05)",border:`1px solid rgba(0,194,178,0.15)`})}}>
                <div style={{fontSize:11,fontWeight:700,letterSpacing:1,textTransform:"uppercase",color:T.sub,marginBottom:8}}>Next Level</div>
                <div style={{fontSize:28,marginBottom:4}}>{currentLevel.next.badge}</div>
                <div style={{fontFamily:"'Syne',sans-serif",fontSize:12,fontWeight:800,color:T.teal}}>{currentLevel.next.name}</div>
                <div style={{fontSize:11,color:T.sub,marginTop:2}}>{currentLevel.ptsToNext.toLocaleString()} pts to go</div>
                <div style={{height:4,borderRadius:99,background:T.border,marginTop:8,overflow:"hidden"}}>
                  <div style={{height:"100%",borderRadius:99,width:`${currentLevel.pct}%`,background:`linear-gradient(90deg,${T.teal},${T.teal2})`}}/>
                </div>
              </div>
            )}
          </div>
          {/* tier history */}
          {tierHistory.length>0&&(
            <div style={{...card(),margin:"0 16px 12px"}}>
              <div style={{fontSize:11,fontWeight:700,letterSpacing:1.5,textTransform:"uppercase",color:T.sub,marginBottom:12}}>Last {Math.min(tierHistory.length,14)} Days</div>
              <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
                {tierHistory.slice(0,14).map((h,i)=>{
                  const tc=TIER_CONFIG[h.tier]||TIER_CONFIG.none;
                  return<div key={i} title={`${h.date} — ${tc.label}`} style={{width:32,height:32,borderRadius:9,display:"flex",alignItems:"center",justifyContent:"center",fontSize:15,background:tc.bg,border:`1.5px solid ${tc.border}`,cursor:"default"}}>{tc.emoji==="—"?"·":tc.emoji}</div>;
                })}
              </div>
              <div style={{display:"flex",gap:12,marginTop:12,paddingTop:10,borderTop:`1px solid ${T.border}`}}>
                {["platinum","diamond","gold","none"].map(k=>{const tc=TIER_CONFIG[k];return(
                  <div key={k} style={{display:"flex",alignItems:"center",gap:4,fontSize:11,color:T.sub}}>
                    <span style={{fontSize:12}}>{tc.emoji==="—"?"·":tc.emoji}</span>{k==="none"?"Miss":tc.label.split(" ")[0]}
                  </div>
                );})}
              </div>
            </div>
          )}
          {/* milestone analysis */}
          {isStreakMilestone&&(
            <div style={{...card({margin:"0 16px 12px",background:`linear-gradient(135deg,${tierCfg.bg},rgba(255,214,107,0.06))`,border:`1.5px solid ${tierCfg.border}`})}}>
              <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:8}}>
                <span style={{fontSize:20}}>🎯</span>
                <span style={{fontFamily:"'Syne',sans-serif",fontWeight:800,fontSize:15,color:T.text}}>{streak}-Day Milestone!</span>
              </div>
              <p style={{fontSize:13,color:T.sub,lineHeight:1.6,margin:"0 0 12px"}}>You've hit {streak} days. Time to analyse your performance.</p>
              {!streakReport?(
                <button style={btnPrimary({fontSize:13,padding:"10px 20px",opacity:loadingStreakReport?0.6:1})} onClick={generateStreakReport} disabled={loadingStreakReport}>
                  {loadingStreakReport?"Analysing…":"Get Performance Analysis ✦"}
                </button>
              ):(
                <div>
                  <div style={{padding:"14px",borderRadius:12,background:T.card,border:`1px solid ${T.border}`,fontSize:13,lineHeight:1.8,whiteSpace:"pre-wrap",color:T.text}}>{streakReport}</div>
                  <button onClick={()=>setStreakReport("")} style={btn({background:"none",color:T.teal,fontSize:12,fontWeight:600,marginTop:8,padding:0})}>Refresh →</button>
                </div>
              )}
            </div>
          )}
          <div style={{textAlign:"center",padding:"8px 16px 16px"}}>
            <button onClick={()=>supabase.auth.signOut()} style={btn({background:"none",color:T.sub,fontSize:12,padding:"8px 16px",border:`1px solid ${T.border}`,borderRadius:50})}>Sign out ↩</button>
          </div>
        </div>
      );

      return(
        <Shell>
          {tab==="plan"&&<PlanTab/>}
          {tab==="focus"&&<FocusTab/>}
          {tab==="reflect"&&<ReflectTab/>}
          {tab==="progress"&&<ProgressTab/>}
        </Shell>
      );
    };

    function waitForSupabase(cb){
      if(window.__supabaseCreateClient)cb();
      else window.addEventListener('supabase-ready',cb,{once:true});
    }
    waitForSupabase(()=>{
      ReactDOM.createRoot(document.getElementById('root')).render(<ZonedInMVP/>);
    });
  </script>
</body>
</html>
